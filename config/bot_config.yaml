# config/bot_config.yaml

# === ГЛАВНЫЙ ФАЙЛ НАСТРОЕК БОТА ===
# Это единственный файл, в котором ты меняешь всё поведение бота.
# Все остальные конфиги (trading_modes, hardware, default) больше не используются.
# Каждый пункт ниже объяснён максимально подробно — даже для человека, который никогда не работал с ботом.

binance:
  # Твои API-ключи от Binance Futures
  # Как работает: бот использует эти ключи, чтобы скачивать свечи, получать баланс, маржу и выставлять реальные ордера.
  # Что делать: зайди в Binance → API Management → создай ключи с правами "Futures".
  # Влияние: без правильных ключей бот работает только в режиме "virtual".
  api_key: "YOUR_API_KEY_HERE"
  api_secret: "YOUR_API_SECRET_HERE"

  # Список прокси (http или socks5)
  # Как работает: бот будет использовать эти прокси при всех запросах к Binance.
  # Когда нужно: если Binance блокирует твой сервер или IP.
  # Влияние: добавление прокси повышает стабильность, но может немного увеличить задержку.
  proxies: []

trading:
  # Режим работы бота
  # virtual — бот торгует "на бумаге", реальные деньги не трогаются (идеально для тестов и отладки)
  # real — бот торгует реальными деньгами (есть риск потери депозита)
  # Рекомендация: сначала всегда ставь "virtual"
  mode: "virtual"

  # Сколько процентов от текущего депозита рисковать на одну сделку
  # Как работает: бот рассчитывает размер позиции так, чтобы в случае срабатывания SL потеря была ровно risk_pct от депозита.
  # Пример: депозит 10000$, risk_pct = 0.01 → максимальная потеря на сделку 100$.
  # Влияние: 0.005 — очень осторожно; 0.02 — агрессивно.
  risk_pct: 0.01

  # Дневной лимит убытка в % от депозита
  # Как работает: если за день убыток превысил этот процент — бот перестаёт открывать новые позиции до следующего дня.
  # Влияние: 0.03 — сильная защита; 0.08 — больше риска за день.
  daily_loss_limit: 0.05

  # Максимальное количество одновременно открытых позиций
  # Как работает: бот не откроет больше этого количества позиций одновременно на всех монетах.
  # Влияние: 2 — очень осторожно; 5–8 — можно торговать больше монет параллельно.
  max_open_positions: 3

  # Максимальное плечо, которое бот может использовать
  # Как работает: ограничивает плечо при открытии позиции.
  # Влияние: 20 — безопасно; 50 — агрессивно (больше прибыль, но выше риск ликвидации).
  max_leverage: 50

  # Минимальная сумма риска на одну сделку в USDT
  # Как работает: бот не откроет позицию, если потенциальный риск меньше этой суммы в долларах.
  # Почему в USDT: чтобы риск на BTC и на SHIB был одинаковый в деньгах.
  # Влияние: 50 — можно торговать мелкие монеты; 300 — только крупные сделки.
  min_position_size_usdt: 100.0

  # Базовое плечо по умолчанию
  leverage: 20

  # Режим расчёта Take-Profit и Stop-Loss
  # classic — фиксированные уровни
  # partial_trailing — частичный трейлинг (рекомендуется)
  # chandelier — ATR-based chandelier exit
  tp_sl_mode: "partial_trailing"

  # Параметры Trailing Stop
  # trailing_activation_pct — при каком профите активировать трейлинг
  # trailing_distance_pct — на сколько % от максимума/минимума двигать SL
  trailing_activation_pct: 0.015
  trailing_distance_pct: 0.008

  # Минимальная вероятность сигнала для входа
  min_prob: 0.65          # для обычных аномалий
  min_prob_q: 0.75        # для тихих аномалий (Q) — выше порог, меньше ложных входов

  # Комиссия и проскальзывание (для реализма расчётов)
  commission: 0.0004      # комиссия Binance Futures
  slippage_pct: 0.0005    # типичное проскальзывание цены

  # Максимальное время жизни позиции в часах
  # Как работает: если позиция открыта дольше — бот закрывает её автоматически.
  max_open_time_hours: 2

  # В какой час UTC сбрасывать дневной лимит убытка
  # Как работает: каждый день в этот час обнуляется счётчик убытка.
  reset_daily_loss_hour: 0

# ==================== МОДЕЛЬ ====================
model:
  # Размер скрытого слоя нейронной сети
  # Как работает: чем больше — тем сложнее модель, лучше ловит паттерны.
  # Влияние: 64 — быстро и легко; 256 — точнее, но больше памяти и времени обучения.
  hidden_size: 128

  # Dropout (регуляризация)
  # Как работает: случайно выключает часть нейронов во время обучения, чтобы модель не переобучалась.
  # Влияние: 0.2 — слабее регуляризация; 0.4 — сильнее защита от переобучения.
  dropout: 0.3

  # Количество эпох обучения
  # Как работает: сколько раз модель проходит весь датасет.
  # Влияние: 15 — быстро; 50 — точнее, но риск переобучения.
  epochs: 30

  # Размер батча
  # Как работает: сколько примеров обрабатывается за один шаг обучения.
  # Влияние: 32 — экономит память; 128 — быстрее обучение.
  batch_size: 64

  # Learning rate (скорость обучения)
  # Как работает: насколько сильно модель меняет веса на каждом шаге.
  # Влияние: 0.001 — быстро; 0.0001 — стабильнее и точнее.
  learning_rate: 0.0005

  # Как часто переобучать модель
  # Как работает: каждые N дней бот переобучает модель на свежих данных.
  # Влияние: 3 — модель всегда свежая; 14 — меньше нагрузка на сервер.
  retrain_interval_days: 7

  # Количество проходов MC Dropout
  # Как работает: используется для оценки неопределённости предсказания.
  # Влияние: 10 — быстро; 30 — точнее оценка уверенности сигнала.
  mc_dropout_passes: 20

# ==================== ТАЙМФРЕЙМЫ И ОКНА ====================
timeframes:
  - "1m"
  - "3m"
  - "5m"
  - "10m"
  - "15m"

seq_len: 100                         # сколько последних свечей подаётся в нейронку
windows: [24, 50, 74, 100]           # окна анализа внутри последовательности

# ==================== VALUE AREA (ПРОФИЛЬ ОБЪЁМА) ====================
va:
  # Какой процент объёма считать Value Area
  # Как работает: 70% объёма вокруг POC считается Value Area (VAH/VAL).
  # Влияние: 0.65 — узкая зона; 0.80 — широкая зона.
  va_percentage: 0.70

  # Шаг биннинга цены в профиле объёма
  # Как работает: с каким шагом строится профиль.
  # Влияние: 0.001 — очень точно; 0.005 — быстрее расчёт.
  price_bin_step_pct: 0.002

# ==================== CONSENSUS ====================
consensus:
  # Минимальное количество таймфреймов для подтверждения сигнала
  # Как работает: сигнал считается сильным только если его подтверждают минимум N старших TF.
  # Влияние: 2 — больше сигналов; 3 — строже, меньше ложных входов.
  min_tf_consensus: 2

# ==================== CLIPPING BOUNDS ====================
clipping_bounds:
  delta_change_pct: [-100, 100]
  volatility_change_pct: [-50, 50]
  price_change_pct: [-30, 30]

# ==================== SCENARIO TRACKER ====================
scenario_tracker:
  bayesian_prior_wins: 1.0
  bayesian_prior_losses: 3.0
  decay_half_life_days: 90.0
  regime_delta_norm_threshold: 0.65

# ==================== WARM-UP ====================
warmup:
  # Сколько свечей скачать и обработать перед началом торговли
  # Как работает: прогрев кэша и модели перед live_loop.
  # Влияние: 500 — быстро запускается; 2000 — лучше прогрев.
  candles: 1000

# ==================== HARDWARE (сервер) ====================
hardware:
  # Количество параллельных потоков
  # Как работает: используется для обработки свечей в live_loop.
  # Влияние: 16 — оптимально для сервера; больше — выше нагрузка на CPU.
  max_workers: 16

# ==================== BACKTEST ====================
backtest:
  # Минимальное количество сделок, чтобы учитывать PR для монеты
  # Как работает: если сделок меньше — монета не попадает в whitelist.
  # Влияние: 5 — больше монет; 20 — только проверенные.
  min_trades_for_pr: 10

  # Минимальный PR, при котором монета считается пригодной
  # Как работает: фильтр для whitelist.
  # Влияние: 0.0 — все монеты; 5.0 — только очень прибыльные.
  min_pr_threshold: 0.0

# ==================== FILTER ====================
filter:
  # Минимальный возраст монеты в месяцах
  # Как работает: отсекает слишком молодые монеты.
  # Влияние: 1 — можно торговать новые; 6 — только проверенные.
  min_age_months: 3

  # Минимальный PR для включения в whitelist
  # Как работает: фильтр для whitelist.
  # Влияние: 3.0 — больше монет; 8.0 — только самые сильные.
  min_pr: 5.0

  # Минимальное количество сделок для включения в whitelist
  # Как работает: фильтр для whitelist.
  # Влияние: 10 — больше монет; 50 — только проверенные.
  min_trades: 20

# ==================== LOGGING ====================
logging:
  # Уровень логирования
  # Как работает: INFO — обычные сообщения, DEBUG — очень подробные логи, WARNING/ERROR — только ошибки.
  # Влияние: DEBUG — много информации для отладки; INFO — чистый лог.
  level: "INFO"

  # Путь к файлу лога
  file: "logs/bot.log"

  # Максимальный размер файла лога в мегабайтах
  # Как работает: когда файл достигает этого размера — создаётся новый.
  # Влияние: 50 — маленький файл; 500 — большой файл.
  max_size_mb: 100

# ==================== PARTIAL TRAILING ====================
partial_trailing:
  # Как работает: когда прибыль достигает activation_pct, закрывается partial_percent позиции, остаток переходит в трейлинг.
  # partial_percent: 0.5 = закрывается половина позиции.
  partial_percent: 0.5
  activation_pct: 0.015