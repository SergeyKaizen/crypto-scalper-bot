# config/bot_config.yaml

# === ОСНОВНОЙ КОНФИГУРАЦИОННЫЙ ФАЙЛ БОТА ===
# Это единственный основной файл настроек проекта.
# Каждый параметр имеет подробное описание: как работает и как влияет изменение значения.

binance:
  # API ключи для подключения к Binance Futures
  # Как работает: бот использует эти ключи для всех запросов (скачивание свечей, выставление ордеров, получение баланса и маржи).
  # На что влияет изменение: неправильные ключи → ошибка авторизации, бот не сможет торговать в real-режиме.
  api_key: "YOUR_API_KEY_HERE"
  api_secret: "YOUR_API_SECRET_HERE"

  # Список прокси (http или socks5)
  # Как работает: бот автоматически использует их при всех запросах к Binance.
  # На что влияет изменение: добавление прокси → повышает стабильность при блокировках, но может увеличить задержку.
  proxies: []

trading:
  # Режим торговли
  # Как работает: "virtual" — все сделки симулируются в памяти (без риска), "real" — реальные ордера на бирже.
  # На что влияет изменение: "real" → реальный риск потери денег и реальная прибыль; "virtual" → безопасное тестирование стратегии.
  mode: "virtual"

  # Риск на одну сделку в % от текущего депозита
  # Как работает: размер позиции автоматически рассчитывается как (депозит × risk_pct) / расстояние до SL.
  # На что влияет изменение: 0.005 → очень консервативно, маленький drawdown; 0.02 → агрессивно, выше прибыль и риск.
  risk_pct: 0.01

  # Дневной лимит убытка в % от депозита
  # Как работает: при достижении лимита новые позиции запрещаются до следующего дня.
  # На что влияет изменение: 0.03 → сильная защита капитала; 0.08 → больше риска за день.
  daily_loss_limit: 0.05

  # Максимальное количество одновременно открытых позиций
  # Как работает: глобальный лимит на все монеты одновременно.
  # На что влияет изменение: 2 → очень консервативно; 5 → больше параллельных сделок, выше нагрузка на депозит.
  max_open_positions: 3

  # Максимальное плечо
  # Как работает: применяется перед открытием позиции (берётся минимум с биржевым лимитом).
  # На что влияет изменение: 10 → безопасно, меньше риск ликвидации; 50 → агрессивно, выше потенциальная прибыль.
  max_leverage: 50

  # Минимальный размер позиции в единицах монеты
  # Как работает: фильтр слишком мелких ордеров (Binance имеет минимальный размер лота).
  # На что влияет изменение: уменьшение → можно торговать мелкие монеты; увеличение → пропускаются мелкие сделки.
  min_position_size: 0.001

  # Базовое плечо (используется по умолчанию)
  # Как работает: применяется, если не указано иное.
  # На что влияет изменение: выше → меньше маржи нужно для открытия позиции.
  leverage: 20

  # Множители ATR для расчёта TP и SL
  # Как работает: TP = entry + (ATR × tp_multiplier), SL = entry - (ATR × sl_multiplier)
  # На что влияет изменение: увеличение tp_multiplier → больше цель по прибыли, ниже winrate.
  tp_multiplier: 2.0
  sl_multiplier: 1.0

  # Режим расчёта TP/SL
  # Как работает: "classic" — фиксированный, "partial_trailing" — частичный трейлинг, "chandelier" — ATR-based.
  # На что влияет изменение: "partial_trailing" → лучше фиксирует прибыль в тренде.
  tp_sl_mode: "partial_trailing"

  # Trailing stop параметры
  # Как работает: trailing активируется при достижении trailing_activation_pct, затем SL двигается на trailing_distance_pct от экстремума.
  # На что влияет изменение: уменьшение activation → раньше начинается трейлинг, выше вероятность преждевременного закрытия.
  trailing_activation_pct: 0.015
  trailing_distance_pct: 0.008

  # Фильтры сигналов
  min_prob: 0.65          # минимальная вероятность модели для обычных аномалий (C, V, CV)
  min_prob_q: 0.75        # повышенный порог для тихого режима (Q) — меньше ложных входов
  # На что влияет изменение: повышение → меньше сигналов, выше качество входов.

  # Комиссия и slippage (для реализма в backtest и live)
  commission: 0.0004      # taker fee Binance Futures (0.04%)
  slippage_pct: 0.0005    # типичное проскальзывание на 15s–1m таймфреймах (0.05%)

  # Максимальное время удержания позиции в часах
  # Как работает: при превышении позиция закрывается автоматически.
  # На что влияет изменение: уменьшение → быстрее выход из позиции, меньше риска.
  max_open_time_hours: 2

# Модель
model:
  # Размер скрытого слоя GRU/Conv1D
  # Как работает: определяет сложность модели (больше нейронов → лучше захватывает паттерны).
  # На что влияет изменение: 64 → легче и быстрее; 256 → точнее, но больше памяти и времени обучения.
  hidden_size: 128

  # Dropout (регуляризация)
  # Как работает: случайно выключает нейроны во время обучения для предотвращения переобучения.
  # На что влияет изменение: 0.2 → меньше регуляризации; 0.4 → сильнее защита от переобучения.
  dropout: 0.3

  # Количество эпох обучения
  # Как работает: сколько раз модель проходит весь датасет.
  # На что влияет изменение: 15 → быстрее обучение; 50 → точнее, но риск переобучения.
  epochs: 30

  # Размер батча
  # Как работает: сколько примеров обрабатывается за один шаг обучения.
  # На что влияет изменение: 32 → экономнее память; 128 → быстрее обучение на GPU.
  batch_size: 64

  # Learning rate (скорость обучения)
  # Как работает: насколько сильно модель обновляет веса на каждом шаге.
  # На что влияет изменение: 0.001 → быстрее сходится; 0.0001 → стабильнее и точнее.
  learning_rate: 0.0005

  # Интервал переобучения модели
  # Как работает: переобучает модель каждые N дней.
  # На что влияет изменение: 3 → чаще актуальная модель; 14 → экономия ресурсов.
  retrain_interval_days: 7

  # Количество проходов MC Dropout
  # Как работает: используется для оценки неопределённости предсказания (uncertainty).
  # На что влияет изменение: 10 → быстрее; 30 → точнее оценка uncertainty.
  mc_dropout_passes: 20

# Таймфреймы и окна
timeframes:
  - "1m"
  - "3m"
  - "5m"
  - "10m"
  - "15m"

seq_len: 100                         # длина последовательности для модели (больше = больше контекста, медленнее обучение)
windows: [24, 50, 74, 100]           # окна анализа для мульти-окна

# Value Area (профиль объёма)
va:
  # Процент объёма для Value Area (VAH/VAL)
  # Как работает: 70% объёма вокруг POC считается Value Area.
  # На что влияет изменение: 0.65 → уже VA; 0.80 → шире VA.
  va_percentage: 0.70

  # Шаг биннинга цены в профиле
  # Как работает: шаг в % от средней цены.
  # На что влияет изменение: 0.001 → точнее профиль; 0.005 → быстрее расчёт.
  price_bin_step_pct: 0.002

# Consensus (мульти-TF подтверждение)
consensus:
  # Минимальное количество старших TF для подтверждения сигнала
  # Как работает: сигнал считается подтверждённым только при согласии N старших TF.
  # На что влияет изменение: 2 → больше сигналов; 3 → строже, меньше ложных.
  min_tf_consensus: 2

# Clipping bounds (защита от выбросов)
clipping_bounds:
  # Границы для clipping признаков (защита от аномально больших значений)
  delta_change_pct: [-100, 100]
  volatility_change_pct: [-50, 50]
  price_change_pct: [-30, 30]

# Scenario Tracker
scenario_tracker:
  # Bayesian prior (сглаживание новых сценариев)
  # Как работает: добавляет "виртуальные" победы/поражения для защиты от 100% winrate на малом количестве сделок.
  bayesian_prior_wins: 1.0
  bayesian_prior_losses: 3.0

  # Decay half-life (забывание старых сценариев)
  # Как работает: старые сценарии постепенно теряют вес.
  # На что влияет изменение: 60 → быстрее забываем; 120 → дольше помним историю.
  decay_half_life_days: 90.0

  # Порог для определения режима (тренд)
  # Как работает: если delta_norm > threshold → бычий режим.
  regime_delta_norm_threshold: 0.65

# Warm-up (прогрев кэша перед торговлей)
warmup:
  # Количество свечей для прогрева кэша и модели
  # Как работает: перед стартом live_loop скачивает и обрабатывает последние свечи.
  # На что влияет изменение: 500 → быстрее запуск; 2000 → лучше прогрев.
  candles: 1000

# Hardware
hardware:
  # Количество параллельных потоков
  # Как работает: используется в ThreadPoolExecutor для обработки свечей.
  # На что влияет изменение: больше → быстрее обработка, но выше нагрузка на телефон/сервер.
  max_workers: 8

# Backtest
backtest:
  # Минимальное количество сделок для учёта в PR
  min_trades_for_pr: 10
  # Минимальный PR для включения монеты в whitelist
  min_pr_threshold: 0.0

# Filter
filter:
  # Минимальный возраст монеты в месяцах
  min_age_months: 3
  # Минимальный PR для включения в whitelist
  min_pr: 5.0
  # Минимальное количество сделок
  min_trades: 20

# Logging
logging:
  level: "INFO"
  file: "logs/bot.log"
  max_size_mb: 100