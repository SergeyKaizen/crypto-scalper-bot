# config/bot_config.yaml

# === ОСНОВНОЙ КОНФИГУРАЦИОННЫЙ ФАЙЛ БОТА ===
# Теперь здесь вынесены ВСЕ параметры проекта без исключения.
# Каждый параметр имеет полное описание: как работает и как влияет изменение значения.

binance:
  # API ключи для подключения к Binance Futures
  # Как работает: используются для скачивания свечей, исполнения ордеров и получения баланса.
  # Изменение: неправильные ключи → ошибка авторизации и невозможность real-торговли.
  api_key: "YOUR_API_KEY_HERE"
  api_secret: "YOUR_API_SECRET_HERE"

  # Список прокси (http или socks5)
  # Как работает: бот автоматически использует их при всех запросах к Binance.
  # Изменение: добавление прокси → повышает стабильность при блокировках, но может увеличить задержку.
  proxies: []

trading:
  # Режим торговли
  # Как работает: "virtual" — симуляция без риска, "real" — реальные ордера.
  # Изменение: "real" → реальный риск и прибыль, "virtual" → безопасное тестирование.
  mode: "virtual"

  # Риск на одну сделку в % от текущего депозита
  # Как работает: размер позиции = (депозит × risk_pct) / расстояние до SL.
  # Изменение: 0.005 → консервативно, маленький drawdown; 0.02 → агрессивно, выше прибыль и риск.
  risk_pct: 0.01

  # Дневной лимит убытка в % от депозита
  # Как работает: при достижении лимита новые позиции запрещаются до следующего дня.
  # Изменение: 0.03 → сильная защита; 0.08 → больше риска за день.
  daily_loss_limit: 0.05

  # Максимальное количество одновременно открытых позиций
  # Как работает: глобальный лимит на все монеты.
  # Изменение: 2 → консервативно; 5 → больше параллельных сделок.
  max_open_positions: 3

  # Максимальное плечо
  # Как работает: применяется перед открытием позиции.
  # Изменение: 10 → безопасно; 50 → агрессивно (выше риск ликвидации).
  max_leverage: 50

  # Минимальный размер позиции в единицах монеты
  # Как работает: фильтр слишком мелких ордеров.
  # Изменение: уменьшение → можно торговать мелкие монеты.
  min_position_size: 0.001

  # Базовое плечо
  leverage: 20

  # Множители ATR для TP и SL
  # Как работает: TP = entry + (ATR × tp_multiplier), SL = entry - (ATR × sl_multiplier)
  # Изменение: увеличение tp_multiplier → больше цель, ниже winrate.
  tp_multiplier: 2.0
  sl_multiplier: 1.0

  # Режимы TP/SL
  # Как работает: "classic" — фиксированный, "partial_trailing" — частичный трейлинг, "chandelier" — ATR-based.
  # Изменение: "partial_trailing" → лучше фиксирует прибыль.
  tp_sl_mode: "partial_trailing"

  # Trailing stop параметры
  # Как работает: активируется при достижении trailing_activation_pct, затем SL двигается на trailing_distance_pct.
  # Изменение: уменьшение activation → раньше начинается трейлинг.
  trailing_activation_pct: 0.015
  trailing_distance_pct: 0.008

  # Фильтры сигналов
  min_prob: 0.65          # минимальная вероятность для обычных аномалий
  min_prob_q: 0.75        # повышенный порог для Quiet (меньше ложных входов)

  # Комиссия и slippage
  commission: 0.0004      # taker fee Binance Futures
  slippage_pct: 0.0005    # типичное проскальзывание

  # Максимальное время удержания позиции
  max_open_time_hours: 2

  # Shadow trading (виртуальная торговля параллельно с реальной)
  # Как работает: ведёт параллельную виртуальную торговлю для сравнения.
  # Изменение: true → собирается статистика shadow vs real.
  shadow_trading_enabled: false

# Модель
model:
  # Размер скрытого слоя GRU/Conv1D
  # Как работает: больше нейронов → модель сложнее, лучше захватывает паттерны.
  # Изменение: 64 → легче и быстрее; 256 → точнее, но больше памяти и времени обучения.
  hidden_size: 128

  # Dropout (регуляризация)
  # Как работает: случайно выключает нейроны во время обучения.
  # Изменение: 0.2 → меньше регуляризации; 0.4 → сильнее защита от переобучения.
  dropout: 0.3

  # Количество эпох обучения
  # Как работает: сколько раз модель проходит весь датасет.
  # Изменение: 15 → быстрее; 50 → точнее, но риск переобучения.
  epochs: 30

  # Размер батча
  # Как работает: сколько примеров обрабатывается за один шаг.
  # Изменение: 32 → экономнее память; 128 → быстрее обучение на GPU.
  batch_size: 64

  # Learning rate (скорость обучения)
  # Как работает: насколько сильно модель обновляет веса.
  # Изменение: 0.001 → быстрее; 0.0001 → стабильнее.
  learning_rate: 0.0005

  # Интервал переобучения модели
  # Как работает: переобучает модель каждые N дней.
  # Изменение: 3 → чаще актуальная модель; 14 → экономия ресурсов.
  retrain_interval_days: 7

  # Количество проходов MC Dropout
  # Как работает: используется для оценки неопределённости предсказания.
  # Изменение: 10 → быстрее; 30 → точнее uncertainty.
  mc_dropout_passes: 20

# Таймфреймы и окна
timeframes:
  - "1m"
  - "3m"
  - "5m"
  - "10m"
  - "15m"

seq_len: 100                         # длина последовательности для модели
windows: [24, 50, 74, 100]           # окна анализа

# Value Area (профиль объёма)
va:
  # Процент объёма для Value Area (VAH/VAL)
  # Как работает: 70% объёма вокруг POC считается Value Area.
  # Изменение: 0.65 → уже VA; 0.80 → шире VA.
  va_percentage: 0.70

  # Шаг биннинга цены в профиле
  # Как работает: шаг в % от средней цены.
  # Изменение: 0.001 → точнее профиль; 0.005 → быстрее расчёт.
  price_bin_step_pct: 0.002

# Consensus (мульти-TF подтверждение)
consensus:
  # Минимальное количество старших TF для подтверждения сигнала
  # Как работает: сигнал считается подтверждённым только при согласии N старших TF.
  # Изменение: 2 → больше сигналов; 3 → строже, меньше ложных.
  min_tf_consensus: 2

# Clipping bounds (защита от выбросов)
clipping_bounds:
  # Границы для clipping признаков
  delta_change_pct: [-100, 100]
  volatility_change_pct: [-50, 50]
  price_change_pct: [-30, 30]

# Scenario Tracker
scenario_tracker:
  # Bayesian prior (сглаживание)
  bayesian_prior_wins: 1.0
  bayesian_prior_losses: 3.0
  # Decay half-life (забывание старых сценариев)
  decay_half_life_days: 90.0
  # Порог для определения режима (тренд)
  regime_delta_norm_threshold: 0.65

# Warm-up (прогрев кэша перед торговлей)
warmup:
  # Количество свечей для прогрева кэша и модели
  # Как работает: перед стартом live_loop скачивает и обрабатывает последние свечи.
  # Изменение: 500 → быстрее запуск; 2000 → лучше прогрев.
  candles: 1000

# Hardware
hardware:
  max_workers: 8

# Backtest
backtest:
  # Минимальное количество сделок для учёта в PR
  min_trades_for_pr: 10
  # Минимальный PR для включения монеты в whitelist
  min_pr_threshold: 0.0

# Filter
filter:
  # Минимальный возраст монеты в месяцах
  min_age_months: 3
  # Минимальный PR для включения в whitelist
  min_pr: 5.0
  # Минимальное количество сделок
  min_trades: 20

# Logging
logging:
  level: "INFO"
  file: "logs/bot.log"
  max_size_mb: 100